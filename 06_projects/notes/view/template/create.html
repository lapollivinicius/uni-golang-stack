{{ define "title" }} Create a note {{ end }}

{{ define "content" }}

  <h1>Create a note</h1>

  <form action="">

    <label for="title">
      <input type="text" name="title" id="title" maxlength="50" placeholder="Title">
    </label>

    <label for="content">
      <input type="text" name="content" id="content" maxlength="250" placeholder="Describe your note">
    </label>

    <button type="submit">Save</button>
  </form>

{{ end }}
